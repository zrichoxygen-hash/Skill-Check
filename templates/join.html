<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Rejoindre la partie</title>
    <link rel="stylesheet" href="/static/style.css">
  </head>
  <body>
    <div class="container">
      <div class="card">
        <div class="header">
          <div class="brand">
            <div class="logo">QZ</div>
            <div>
              <h1>Rejoins la partie</h1>
              <div style="color:var(--muted)">Code: {{ game_id }}</div>
            </div>
          </div>
        </div>

        <div id="joinForm" style="margin-top:12px">
          <label>Nom:</label>
          <input id="name" type="text" placeholder="Ton prénom" />
          <label style="margin-top:12px">Choisis un avatar :</label>
          <div id="avatarOptions" style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:8px">
            <button type="button" class="secondary avatar-btn" data-avatar="😎">😎</button>
            <button type="button" class="secondary avatar-btn" data-avatar="🌟">🌟</button>
            <button type="button" class="secondary avatar-btn" data-avatar="🚀">🚀</button>
            <button type="button" class="secondary avatar-btn" data-avatar="🎓">🎓</button>
          </div>
          <p id="avatarHelp" style="margin-top:8px;color:var(--muted)">Avatar sélectionné : <span id="selectedAvatar">😎</span></p>
          <button id="join">Rejoindre</button>
        </div>

        <div id="playerArea" style="display:none; margin-top:12px">
          <div class="question-box">
            <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
              <div id="playerAvatar" style="font-size:28px">😎</div>
              <div>
                <div id="playerName" style="font-weight:700"></div>
                <div style="color:var(--muted)">En attente de la question...</div>
              </div>
            </div>
            <h3>Question</h3>
            <div id="questionText"></div>
            <div id="options" class="options"></div>
            <div style="margin-top:8px">Temps restant: <span id="timer" class="timer">0</span>s</div>
            <div id="result" style="margin-top:8px;color:var(--muted)"></div>
            <div id="scoreboard" style="margin-top:16px">
              <h4 style="margin-bottom:8px">Classement</h4>
              <ul id="playerScores" class="list"></ul>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script>
      const GAME_ID = "{{ game_id }}";
    </script>
    <script src="/static/player.js"></script>
  </body>
</html>
